name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit ruff

      - name: Run pre-commit
        run: pre-commit run --all-files

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r backend/requirements.txt

      - name: Ruff — lint
        run: ruff check backend/

      - name: Ruff — format check
        run: ruff format --check backend/

  backend-build:
    name: Backend — Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (production target)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

  frontend-docker-build:
    name: Frontend — Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image (production target)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───Finally────────────────────────────────────────────────────────────
  ci-success:
    name: CI Passed ✅
    runs-on: ubuntu-latest
    needs: [pre-commit, backend-lint, backend-build, frontend-build, frontend-docker-build]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.pre-commit.result }}" != "success" ||
                "${{ needs.backend-lint.result }}" != "success" ||
                "${{ needs.backend-build.result }}" != "success" ||
                "${{ needs.frontend-build.result }}" != "success" ||
                "${{ needs.frontend-docker-build.result }}" != "success" ]]; then
            echo "One or more steps failed."
            exit 1
          fi
          echo "All steps were successful — ready to deploy"
